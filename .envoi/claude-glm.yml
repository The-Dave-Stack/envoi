---
name: "Claude Code Runner using z.ai API (GLM 4.5)"
description: "Configuration to initialize Claude Code using z.ai API (GLM 4.5) and secrets from OpenBao."
tags:
  - claude
  - z.ai
  - ai
  - openbao
---

providers:  
  openbao:
    type: openbao
    enabled: true
    config:
      address: "https://openbao.thedavestack.com"
      token: "${OPENBAO_TOKEN}"

# Default command to execute when no command-line arguments are provided
command:
  default: "claude"
  description: "Run Claude Code using z.ai API (GLM 4.5)"
  
variables:
  - name: ANTHROPIC_BASE_URL
    required: true
    description: "Claude Code API base URL"
    source:
      type: openbao
      path: local/data/aiassistants
      namespace: tds
  - name: ANTHROPIC_AUTH_TOKEN
    required: true
    description: "Claude Code API authentication token"
    source:
      type: openbao
      path: local/data/aiassistants
      namespace: tds
  - name: ANTHROPIC_MODEL
    required: true
    description: "Claude Code model to use"
    source:
      type: openbao
      path: local/data/aiassistants
      namespace: tds
  - name: ANTHROPIC_SMALL_FAST_MODEL
    required: true
    description: "Claude Code small fasth model to use"
    source:
      type: openbao
      path: local/data/aiassistants
      namespace: tds
  - name: DOKPLOY_TDS_API_KEY
    required: true
    description: "Dokploy API key for TDS"
    source:
      type: openbao
      path: local/data/mcp
      namespace: tds