name: CI/CD Health Monitor

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full security scan'
        required: false
        default: 'false'
        type: boolean
      check_dependencies:
        description: 'Check for dependency updates'
        required: false
        default: 'true'
        type: boolean

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Check for dependency updates
      if: github.event.inputs.check_dependencies != 'false'
      run: |
        echo "🔍 Checking for dependency updates..."
        npm outdated || echo "Some dependencies may be outdated"
        npm audit --audit-level moderate || echo "Some vulnerabilities found"
    
    - name: Validate project structure
      run: |
        echo "📁 Validating project structure..."
        
        # Check essential files
        files=("package.json" "tsconfig.json" "README.md" "CHANGELOG.md" "LICENSE")
        for file in "${files[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ $file exists"
          else
            echo "❌ $file is missing"
            exit 1
          fi
        done
        
        # Check essential directories
        dirs=("src" "dist" "__tests__" ".github")
        for dir in "${dirs[@]}"; do
          if [ -d "$dir" ]; then
            echo "✅ $dir/ exists"
          else
            echo "❌ $dir/ is missing"
            exit 1
          fi
        done
    
    - name: Validate configuration files
      run: |
        echo "⚙️ Validating configuration files..."
        
        # Validate package.json
        npm run validate-changelog || echo "⚠️ Changelog validation warning"
        
        # Check TypeScript compilation
        npm run build || echo "❌ Build failed"
        
        # Check linting
        npm run lint || echo "❌ Linting failed"
    
    - name: Quick test run
      run: |
        echo "🧪 Running quick test suite..."
        npm test || echo "❌ Tests failed"
    
    - name: Check CI/CD workflow files
      run: |
        echo "🔄 Validating CI/CD workflows..."
        
        # Check workflow files
        workflows=(".github/workflows/ci.yml" ".github/workflows/release.yml")
        for workflow in "${workflows[@]}"; do
          if [ -f "$workflow" ]; then
            echo "✅ $workflow exists"
            
            # Basic YAML validation
            if python3 -c "import yaml; yaml.safe_load(open('$workflow'))" 2>/dev/null; then
              echo "✅ $workflow is valid YAML"
            else
              echo "❌ $workflow has invalid YAML"
              exit 1
            fi
          else
            echo "❌ $workflow is missing"
            exit 1
          fi
        done
    
    - name: Check repository health metrics
      run: |
        echo "📊 Repository health metrics..."
        
        # Count recent commits
        recent_commits=$(git log --since="30 days ago" --oneline | wc -l)
        echo "Recent commits (30 days): $recent_commits"
        
        # Check for unmerged PRs (requires GH CLI)
        if command -v gh &> /dev/null; then
          open_prs=$(gh pr list --state open --limit 10 | wc -l)
          echo "Open PRs: $open_prs"
        else
          echo "⚠️ GH CLI not available for PR checking"
        fi
        
        # Check repository size
        repo_size=$(du -sh . | cut -f1)
        echo "Repository size: $repo_size"

  security-monitoring:
    runs-on: ubuntu-latest
    if: github.event.inputs.full_scan == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Full security audit
      run: |
        echo "🔒 Running full security audit..."
        npm audit --audit-level low
    
    - name: Dependency vulnerability scan
      uses: github/codeql-action/analyze@v3
    
    - name: Check for secret leakage
      run: |
        echo "🕵️ Checking for potential secret leakage..."
        
        # Basic secret patterns (not comprehensive)
        if grep -r -i "password\|secret\|token\|key" src/ --include="*.ts" | grep -v "//.*password\|//.*secret\|//.*token\|//.*key" | head -5; then
          echo "⚠️ Potential secrets found in source code"
        else
          echo "✅ No obvious secret patterns found"
        fi

  notify-health:
    runs-on: ubuntu-latest
    needs: [health-check, security-monitoring]
    if: always()
    
    steps:
    - name: Health report
      run: |
        echo "🏥 CI/CD Health Report"
        echo "====================="
        echo "Health Check: ${{ needs.health-check.result }}"
        echo "Security Monitoring: ${{ needs.security-monitoring.result }}"
        echo "Last run: $(date)"
        
        if [ "${{ needs.health-check.result }}" == "success" ]; then
          echo "✅ All health checks passed"
        else
          echo "❌ Some health checks failed"
        fi