name: CI/CD

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run tests
      run: npm test
    
    - name: Build project
      run: npm run build
    
    - name: Validate changelog
      if: github.event_name == 'pull_request' && github.base_ref == 'refs/heads/main'
      run: |
        # Check if changelog has unreleased changes
        if ! grep -q "## \[Unreleased\]" CHANGELOG.md; then
          echo "::error::Changelog must have an [Unreleased] section"
          exit 1
        fi
        
        # Check if package.json version matches changelog
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        if ! grep -q "\[${PACKAGE_VERSION}\]" CHANGELOG.md; then
          echo "::error::Package version $PACKAGE_VERSION not found in changelog"
          exit 1
        fi
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/

  # Automated release job that triggers on push to main
  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
    
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Get current version
      id: version
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
    
    - name: Check if version already exists as release
      id: check_release
      run: |
        if gh release view v${{ steps.version.outputs.VERSION }} --json tagName -q '.tagName' 2>/dev/null; then
          echo "EXISTS=true" >> $GITHUB_OUTPUT
        else
          echo "EXISTS=false" >> $GITHUB_OUTPUT
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
    
    - name: Analyze commits for version bump
      id: bump_type
      if: steps.check_release.outputs.EXISTS == 'false'
      run: |
        BUMP_TYPE=$(npm run analyze-commits | grep 'BUMP_TYPE=' | cut -d'=' -f2)
        echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_OUTPUT
        echo "CURRENT_VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
    
    - name: Update package.json version
      id: update_version
      if: steps.check_release.outputs.EXISTS == 'false' && steps.bump_type.outputs.BUMP_TYPE != 'none'
      run: |
        npm run bump-version -- --${{ steps.bump_type.outputs.BUMP_TYPE }}
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "UPDATED_VERSION=true" >> $GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
    
    - name: Update CHANGELOG.md
      if: steps.update_version.outputs.UPDATED_VERSION == 'true'
      run: |
        npm run update-changelog ${{ steps.update_version.outputs.NEW_VERSION }}
    
    - name: Commit version changes
      if: steps.update_version.outputs.UPDATED_VERSION == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add package.json CHANGELOG.md
        git commit -m "chore(release): ${{ steps.update_version.outputs.NEW_VERSION }}"
        git tag v${{ steps.update_version.outputs.NEW_VERSION }}
        git push origin main --follow-tags
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
    
    - name: Create GitHub Release
      if: steps.update_version.outputs.UPDATED_VERSION == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.update_version.outputs.NEW_VERSION }}
        release_name: v${{ steps.update_version.outputs.NEW_VERSION }}
        body: |
          Release v${{ steps.update_version.outputs.NEW_VERSION }}
          
          ## Changes
          $(git log --pretty=format:'- %s' $(git describe --tags --abbrev=0)..HEAD)
        draft: false
        prerelease: false
    
    - name: Publish to npm
      if: steps.update_version.outputs.UPDATED_VERSION == 'true'
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Original release job for manual releases
  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Publish to npm
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}