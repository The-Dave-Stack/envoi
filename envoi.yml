providers:
  local:
    type: local
    enabled: true
    config:
      file: .env
  
  openbao:
    type: openbao
    enabled: false
    config:
      address: "${OPENBAO_ADDR}"
      token: "${OPENBAO_TOKEN}"

variables:
  - name: DATABASE_URL
    required: true
    description: "Database connection string"
    source:
      type: local
      file: .env
      key: DB_URL
  - name: API_KEY
    required: true
    description: "API key for external service"
    source:
      type: local
      file: .env
      key: EXTERNAL_API_KEY
  - name: NODE_ENV
    required: false
    default: "development"
    description: "Node.js environment"
  - name: SECRET_TOKEN
    required: false
    description: "Secret token from OpenBao"
    source:
      type: openbao
      path: secret/data/myapp
      key: secret_key
  - name: PORT
    required: false
    default: "3000"
    description: "Server port"
  # 
  # Example for Vault integration
  # - name: LEGACY_TOKEN
  #   required: false
  #   description: "Legacy token from Vault"
  #   source:
  #     type: vault
  #     path: secret/data/myapp
  #     key: api_token

# Default command to execute when no command-line arguments are provided
command:
  default: "npm run envoi:test"
  description: "Test the envoi default command"