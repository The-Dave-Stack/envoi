providers:
  local:
    type: local
    enabled: true
    config:
      file: .env
  
  openbao:
    type: openbao
    enabled: true
    config:
      address: "http://localhost:8200"
      token: "${OPENBAO_TOKEN}"

variables:
  - name: DATABASE_URL
    required: true
    description: "Database connection string"
  - name: API_KEY
    required: true
    description: "API key for external service"
  - name: NODE_ENV
    required: false
    default: "development"
    description: "Node.js environment"
  - name: SECRET_TOKEN
    required: false
    description: "Secret token from OpenBao"
  - name: PORT
    required: false
    default: "3000"
    description: "Server port"

sources:
  DATABASE_URL:
    type: local
    file: .env
    key: DB_URL
  API_KEY:
    type: local
    file: .env
    key: EXTERNAL_API_KEY
  # Example for OpenBao integration (v1.1)
  SECRET_TOKEN:
    type: openbao
    path: secret/data/myapp
    key: secret_key
  # 
  # Example for Vault integration (v1.1)
  # LEGACY_TOKEN:
  #   type: vault
  #  path: secret/data/myapp
  #   key: api_token

# Default command to execute when no command-line arguments are provided
command:
  default: "npm run envoi:test"
  description: "Test the envoi default command"